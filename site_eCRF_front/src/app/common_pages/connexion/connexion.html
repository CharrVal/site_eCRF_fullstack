<h5>Connexion</h5>

<form [formGroup]="connexionForm" (ngSubmit)="connecter()">
    <div>
        <label for="identifiant">Identifiant</label>
        <input type="text" name="identifiant" id="identifiant" placeholder="Entrez votre login" formControlName="identifiant">
    </div>
    <div>
        <label>Mot de passe</label>
        <input type="password" name="password" id="password" placeholder="Entrez votre mot de passe" formControlName="password">
    </div>

    @if(errorMessage){
    <div class="alert alert-danger text-center">
        {{ errorMessage }}
      </div>
    }
    
      <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-lg" [disabled]="connexionForm.invalid">Se connecter</button>
      </div>
</form>
