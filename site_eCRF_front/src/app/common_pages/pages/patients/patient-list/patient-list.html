<div class="container">
  <h5>Voici les patients :</h5>

  @if (patients && patients.length > 0) {
    @for (patient of patients; track patient) {
      <div class="patient-card mb-3 p-2 border rounded">
        <p><strong>Subject Number:</strong> {{ patient.subjectNumber }}</p>
          @if(patient.studyName) {
          <p><strong>Étude:</strong> {{ patient.studyName }}</p>
          }
        <button class="btn btn-sm btn-primary me-2" routerLink="['/patients/update', patient.id]">
          Modifier
        </button>
        <button class="btn btn-sm btn-danger" (click)="deletePatient(patient.id)">
          Supprimer
        </button>
      </div>
    }
  }

  @if(patients.length == 0){
    <p>Aucun patient à charger</p>
  }

  <div class="mt-3">
    <button class="btn btn-success me-2" routerLink="['/patients/create']">Ajouter un patient</button>
    <button class="btn btn-secondary" routerLink="/accueil">Retour</button>
  </div>
</div>
