<div class="container">
  <h5>Voici les visites :</h5>

  @if (visits && visits.length > 0) {
    @for (visit of visits; track visit) {
      <div class="visit-card mb-3 p-2 border rounded">
        <p><strong>{{ visit.name }}</strong></p>
        <p><strong>Date:</strong> {{ visit.visitDate }}</p>
          @if(visit.subjectNumber) {
          <p><strong>Patient Subject #:</strong> {{ visit.subjectNumber }}</p>
          }
        <button class="btn btn-sm btn-primary me-2" routerLink="['/visits/update', visit.id]">
          Modifier
        </button>
        <button class="btn btn-sm btn-danger" (click)="deleteVisit(visit.id)">
          Supprimer
        </button>
      </div>
    }
  }

  @if (visits.length == 0) {
    <p>Aucune visite à charger</p>
  }

  <div class="mt-3">
    <button class="btn btn-success me-2" routerLink="/visits/create">Ajouter une visite</button>
    <button class="btn btn-secondary" routerLink="/accueil">Retour</button>
  </div>
</div>
