<div class="container">
  <h5>Voici les signes vitaux :</h5>

  @if (vitalSigns && vitalSigns.length > 0) {
    @for (vital of vitalSigns; track vital) {
      <div class="vital-card mb-3 p-2 border rounded">
        <p><strong>Type:</strong> {{ vital.type }}</p>
        <p><strong>Valeur:</strong> {{ vital.value }} {{ vital.unit }}</p>
        <p><strong>Mesuré le:</strong> {{ vital.measuredAt }}</p>

        <button class="btn btn-sm btn-primary me-2" routerLink="['/vital-signs/update', vital.id]">
          Modifier
        </button>
        <button class="btn btn-sm btn-danger" (click)="deleteVitalSign(vital.id)">
          Supprimer
        </button>
      </div>
    }
  }

  @if(vitalSigns.length == 0) {
    <p>Aucun signe vital à charger</p>
  }

  <div class="mt-3">
    <button class="btn btn-success me-2" routerLink="/vital-signs/create">Ajouter un signe vital</button>
    <button class="btn btn-secondary" routerLink="/accueil">Retour</button>
  </div>
</div>
