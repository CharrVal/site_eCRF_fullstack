spring.application.name=CRF

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/crf}
spring.datasource.username=${DB_USER:crf_user}
spring.datasource.password=${DB_PASSWORD:crf_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

app.jwt.secret=${JWT_SECRET:defaultSecret}
